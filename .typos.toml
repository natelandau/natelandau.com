[default]
    locale = "en-us"

    [default.extend-words]
        Froms      = "Froms"      # Apple property key "kMDItemWhereFroms"
        Pn         = "Pn"         # flag used in script "-Pn"
        cmo        = "cmo"
        layou      = "layou"
        natelandau = "natelandau"
        nd         = "nd"

[files]
    extend-exclude = ["*.json", "*_cache", ".venv", "cache", "theme/static/css/pygment.css"]
